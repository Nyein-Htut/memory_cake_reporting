{% extends "base.html" %}

{% block title %}每日订单记录 — Memory Cake{% endblock %}

{% block content %}
    <style>
        .section-card {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            transition: all .35s ease;
        }

        .section-card:hover {
            transform: translateY(-4px);
        }

        .input-section {
            border-left: 5px solid #10b981;
            box-shadow: 0 4px 12px rgba(0,0,0,.05);
        }

        .input-section:hover {
            box-shadow: 0 18px 35px rgba(162, 243, 216, 0.12);
        }

        .dashboard-section {
            box-shadow: 0 4px 12px rgba(125, 84, 58, 0.06);
        }

        .dashboard-section:hover {
            box-shadow: 0 18px 35px rgba(83, 64, 35, 0.12);
        }

        .section-glow {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 9999px;
            filter: blur(60px);
            opacity: .4;
            z-index: 0;
        }

        .input-glow {
            top: -40px;
            right: -40px;
            background: #e4fbef;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            letter-spacing: .2em;
            text-transform: uppercase;
        }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .divider-label {
            display: flex;
            align-items: center;
            margin: 18px 0;
        }

        .divider-label::before,
        .divider-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #d6d3d1, transparent);
        }

        .divider-label span {
            margin: 0 20px;
            padding: 8px 18px;
            border: 1px solid #e7e5e4;
            border-radius: 9999px;
            background: #fafaf9;
            color: #78716c;
            font-size: 10px;
            letter-spacing: .3em;
            font-weight: 600;
        }
    </style>

    <header class="py-8 px-4 sm:px-6 lg:px-8 no-print">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div class="space-y-1">
                <h1 class="text-3xl sm:text-4xl font-semibold tracking-wide text-stone-900 font-serif">
                    每日订单流水明细
                </h1>
                <p class="text-xs sm:text-sm text-stone-400 tracking-widest font-sans uppercase">
                    云端数据中心 · 团队多端协同
                </p>
            </div>
            <div class="flex flex-wrap gap-3 w-full sm:w-auto">
                <button onclick="exportTableToCSV()" class="w-full sm:w-auto bg-stone-100 hover:bg-stone-200 text-stone-800 text-xs uppercase tracking-widest font-sans font-semibold py-3.5 px-6 rounded transition-all shadow-xs border border-stone-300/60 cursor-pointer">
                    导出 CSV 表格
                </button>
                <button id="pdfExportBtn" type="button" onclick="downloadTableAsPDF()" class="w-full sm:w-auto bg-stone-950 hover:bg-stone-800 text-white text-xs uppercase tracking-widest font-sans font-semibold py-3.5 px-8 rounded transition-all shadow-sm cursor-pointer">
                    下载 PDF 报表
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-6 sm:space-y-8">

        {% include 'partials/order_form.html' %}

        <div class="divider-label no-print">
            <span>DATA DASHBOARD</span>
        </div>

        <section class="bg-white mb-12 section-card dashboard-section">
            <div class="h-1 bg-gradient-to-r from-stone-900 via-stone-500 to-stone-900"></div>
            <div class="section-glow dashboard-glow"></div>    
            <div class="p-5 bg-gradient-to-r from-stone-900 to-stone-800 border-b border-stone-700 flex justify-between items-center no-print font-sans relative z-10">
                <h2 class="section-title text-white">
                    <span class="section-icon bg-white/10">📊</span>
                    流水汇总看板
                </h2>
            </div>

            {% include 'partials/daily_records.html' %}
        </section>
    </div>

    {% include 'partials/order_modals.html' %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
     async function downloadTableAsPDF() {
    const btn = document.getElementById('pdfExportBtn');
    if (btn) { btn.disabled = true; btn.textContent = '截图中…'; }
    try {
        const noPrints = document.querySelectorAll('.no-print');
        noPrints.forEach(el => el.style.display = 'none');

        const { jsPDF } = window.jspdf;

        // Cards are printed at a FIXED width, independent of the exporting
        // device's screen size. Tying column count to window.innerWidth
        // meant a narrow phone produced a 1-column PDF with every card
        // stretched to the full page width — huge images, tiny content
        // density, one order per page. A fixed print width keeps the PDF
        // looking the same (2 tidy columns) no matter what triggered it.
        const CARD_TARGET_W_MM = 88;

        const orientation = 'portrait';
        const pageW = 210;
        const pageH = 297;
        const margin = 10;
        const gap = 6;
        const usableW = pageW - margin * 2;
        const usableH = pageH - margin * 2;

        const columns = Math.max(1, Math.floor((usableW + gap) / (CARD_TARGET_W_MM + gap)));
        const perCardW = (usableW - gap * (columns - 1)) / columns;

        const pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });

        async function captureCanvas(el, bg) {
            return await html2canvas(el, {
                scale: 2, useCORS: true, allowTaint: true,
                backgroundColor: bg, logging: false,
                windowWidth: el.scrollWidth, width: el.scrollWidth,
            });
        }
        function mmHeightFor(canvas, widthMM) {
            return (canvas.height / canvas.width) * widthMM;
        }

        let curY = margin;
        let dayHeaderData = null;
        let dayHeaderH = 0;

        function placeDayHeader() {
            pdf.addImage(dayHeaderData, 'JPEG', margin, curY, usableW, dayHeaderH);
            curY += dayHeaderH + 3;
        }

        const dayGroups = document.querySelectorAll('#ordersRoot .day-group');

        if (dayGroups.length === 0) {
            pdf.setFontSize(12);
            pdf.text('No records for the selected filter.', margin, margin + 6);
        }

        for (const group of dayGroups) {
            const sepEl = group.querySelector('.day-separator');
            const sepCanvas = await captureCanvas(sepEl, '#ababa9');
            dayHeaderH = mmHeightFor(sepCanvas, usableW);
            dayHeaderData = sepCanvas.toDataURL('image/jpeg', 0.95);

            const cards = Array.from(group.querySelectorAll('.orders-grid > .order-card'));

            // Pre-capture the first row so the header and its first row of
            // cards are judged as one unit — the header is never stranded
            // alone at the bottom of a page.
            let firstCanvases = [];
            let firstHeights = [];
            let firstRowH = 0;
            if (cards.length > 0) {
                const firstChunk = cards.slice(0, columns);
                for (const card of firstChunk) {
                    firstCanvases.push(await captureCanvas(card, '#ffffff'));
                }
                firstHeights = firstCanvases.map(c => mmHeightFor(c, perCardW));
                firstRowH = Math.max(...firstHeights);
            }

            const neededH = dayHeaderH + (cards.length > 0 ? firstRowH + gap : 0);

            // Only break to a new page if this page already has content on
            // it (curY > margin). If the page is still empty, there's
            // nothing to gain by skipping it — draw here even if it runs
            // long, rather than leaving an entirely blank page behind.
            if (curY > margin && curY + neededH > margin + usableH) {
                pdf.addPage();
                curY = margin;
            }
            placeDayHeader();

            let startIndex = 0;
            if (cards.length > 0) {
                firstCanvases.forEach((canvas, idx) => {
                    const x = margin + idx * (perCardW + gap);
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', x, curY, perCardW, firstHeights[idx]);
                });
                curY += firstRowH + gap;
                startIndex = columns;
            }

            for (let i = startIndex; i < cards.length; i += columns) {
                const chunk = cards.slice(i, i + columns);
                const canvases = [];
                for (const card of chunk) {
                    canvases.push(await captureCanvas(card, '#ffffff'));
                }
                const heights = canvases.map(c => mmHeightFor(c, perCardW));
                const rowH = Math.max(...heights);

                if (curY > margin && curY + rowH > margin + usableH) {
                    pdf.addPage();
                    curY = margin;
                    placeDayHeader();
                }

                canvases.forEach((canvas, idx) => {
                    const x = margin + idx * (perCardW + gap);
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', x, curY, perCardW, heights[idx]);
                });

                curY += rowH + gap;
            }

            curY += 4;
        }

        noPrints.forEach(el => el.style.display = '');
        const date = new Date().toISOString().slice(0, 10);
        pdf.save('Memory_Cake_Orders_' + date + '.pdf');

    } catch(err) {
        document.querySelectorAll('.no-print').forEach(el => el.style.display = '');
        alert('PDF 导出失败，请重试。\n' + (err.message || ''));
        console.error(err);
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = '下载 PDF 报表'; }
    }
}

        function exportTableToCSV() {
            const cards = Array.from(document.querySelectorAll('#ordersRoot .order-card'));
            if (cards.length === 0) return;

            const csvRows = [];
            const headers = [
                '日期 (Date)', '客人姓名 (Customer)', '订单来源 (Source)', '商品名称 (Item Name)', 
                '尺寸 (Size)', '单项金额 (Price MMK)', '对应品类备注要求 (Remarks)', 
                '送达时间 (Delivery Time)', '派送物流详细地址 (Address)', '总单总计 (Voucher Total)'
            ];

            csvRows.push(headers.map(h => `"${h.replace(/"/g, '""')}"`).join(','));

            cards.forEach((card) => {
                const date = card.getAttribute('data-date') || '';
                const customer = card.getAttribute('data-customer') || '';
                const source = card.getAttribute('data-source') || '';
                const time = card.getAttribute('data-time') || '';
                const address = card.getAttribute('data-address') || '';
                const total = card.getAttribute('data-total') || '';

                const items = Array.from(card.querySelectorAll('.oc-item'));
                items.forEach((item, idx) => {
                    const itemName = item.getAttribute('data-item-name') || '';
                    const size = item.getAttribute('data-size') || '-';
                    const price = item.getAttribute('data-price') || '0';
                    const remarks = item.getAttribute('data-remarks') || '-';

                    const rowData = [
                        date, customer, source, itemName, size,
                        price, remarks, time, address,
                        idx === 0 ? total : ''
                    ];
                    csvRows.push(rowData.map(val => `"${val.toString().replace(/"/g, '""')}"`).join(','));
                });
            });

            const csvContent = "\uFEFF" + csvRows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `Memory_Cake_Orders_${new Date().toISOString().slice(0, 10)}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
{% endblock %}
