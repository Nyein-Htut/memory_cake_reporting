{# Staff order entry form (Burmese) — payment & price fields never shown to staff #}
<section class="bg-white p-5 sm:p-6 no-print section-card input-section">
    <div class="relative z-10">
        <h2 class="section-title text-emerald-700 mb-6 pb-4 border-b border-emerald-100">
            <span class="section-icon bg-emerald-100">📝</span>
            အော်ဒါအသစ် အမြန်ထည့်သွင်းရန်
        </h2>
    </div>
    <form action="/add_order" method="POST" enctype="multipart/form-data" class="space-y-6 text-sm font-sans">

        <div class="space-y-5">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">🏷️ အော်ဒါလာသည့်နေရာ (Source)</label>
                    <input type="hidden" name="source" id="sourceHidden" value="">
                    <button type="button" id="sourceTriggerBtn" class="wp-trigger wp-empty" onclick="openSourcePicker('sourceTriggerBtn','sourceHidden','အော်ဒါလာသည့်နေရာ ရွေးပါ (Select Source)')">
                        <span>အော်ဒါလာသည့်နေရာ ရွေးပါ</span>
                        <svg class="w-4 h-4 wp-trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                </div>
                <div>
                    <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">👤 ဖောက်သည်အမည် (Customer)</label>
                    <input type="text" name="customer" placeholder="အမည်" class="w-full border border-stone-300 rounded p-3 text-sm outline-none focus:border-stone-900">
                </div>
            </div>

            <div>
                <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">📍 လိပ်စာ &amp; ဆက်သွယ်ရန် (Address &amp; Contact)</label>
                <input type="text" name="address" placeholder="ပို့ဆောင်ရန် လိပ်စာ အသေးစိတ် နှင့် ဖုန်းနံပါတ်" class="w-full border border-stone-300 rounded p-3 text-sm outline-none focus:border-stone-900">
            </div>

            <div>
                <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">📅 ပေးပို့မည့် ရက်စွဲ &amp; အချိန် (Delivery Date &amp; Time)</label>
                <input type="hidden" name="date" id="dateHidden" value="">
                <input type="hidden" name="time" id="timeHidden" value="">
                <button type="button" id="deliveryTriggerBtn" class="wp-trigger wp-empty" onclick="openDeliveryDateWheelPicker('deliveryTriggerBtn','dateHidden','timeHidden')">
                    <span>ရက်စွဲ နှင့် အချိန် ရွေးပါ</span>
                    <svg class="w-4 h-4 wp-trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
                </button>
            </div>

        </div>

        <div class="border-t border-stone-100 pt-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold tracking-widest uppercase text-stone-500">ကုန်ပစ္စည်းစာရင်း အသေးစိတ် (Voucher Items)</h3>
                <button type="button" onclick="addNewItemRow()" class="text-xs bg-stone-100 hover:bg-stone-200 text-stone-800 font-semibold py-1.5 px-4 rounded transition-colors">
                    ➕ ပစ္စည်းအသစ်ထည့်ရန်
                </button>
            </div>

            <div id="itemsContainer" class="space-y-4">
                <div class="item-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 bg-stone-50/40 border border-stone-200/60 rounded relative">
                    <div class="md:col-span-3">
                        <label class="block text-stone-500 text-[11px] mb-1">ပစ္စည်းအမည် (e.g. Custom Cake)</label>
                        <input type="text" name="item_name[]" placeholder="ကိတ်မုန့် / ဖယောင်းတိုင် / အချိုပွဲ" class="w-full border border-stone-300 rounded p-2 text-xs bg-white outline-none">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-stone-500 text-[11px] mb-1">အရွယ်အစား (Size)</label>
                        <input type="text" name="size[]" placeholder="6in" class="w-full border border-stone-300 rounded p-2 text-xs bg-white outline-none">
                    </div>
                    <div class="md:col-span-4">
                        <label class="block text-stone-500 text-[11px] mb-1">အထူးမှတ်ချက် (Remarks)</label>
                        <input type="text" name="remarks[]" placeholder="ရေးသားချက် လိုအပ်ချက်..." class="w-full border border-stone-300 rounded p-2 text-xs bg-white outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-stone-500 text-[11px] mb-1">🎂 ကိတ်မုန့် ကိုးကားပုံ</label>
                        <input type="file" name="cakeImage[]" accept="image/*" class="w-full text-xs text-stone-400 file:py-1 file:px-2 file:rounded file:border-0 file:bg-stone-200 file:text-stone-700 cursor-pointer">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-rose-600 font-medium text-[11px] mb-1">💐 ပန်းစည်း ကိုးကားပုံ</label>
                        <input type="file" name="flowerImage[]" accept="image/*" class="w-full text-xs text-stone-400 file:py-1 file:px-2 file:rounded file:border-0 file:bg-stone-200 file:text-stone-700 cursor-pointer">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-end pt-2">
            <button type="submit" class="w-full sm:w-auto bg-stone-950 hover:bg-stone-800 text-white font-sans text-xs uppercase tracking-widest font-semibold py-3.5 px-10 rounded transition-all shadow-sm">
                အော်ဒါ သိမ်းဆည်းမည် (Save Order Voucher)
            </button>
        </div>
    </form>
</section>

<script>
    // Default the delivery date to today on load.
    (function initDefaultDeliveryDate() {
        const dateHidden = document.getElementById('dateHidden');
        if (dateHidden && !dateHidden.value) {
            dateHidden.value = wpIsoForOffset(0);
        }
    })();

    function addNewItemRow() {
        const container = document.getElementById('itemsContainer');
        const newRow = document.createElement('div');
        newRow.className = "item-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 bg-stone-50/40 border border-stone-200/60 rounded relative mt-3";
        newRow.innerHTML = `
            <div class="md:col-span-3">
                <input type="text" name="item_name[]" placeholder="ပစ္စည်းအမည်" class="w-full border border-stone-300 rounded p-2 text-xs bg-white outline-none">
            </div>
            <div class="md:col-span-1">
                <input type="text" name="size[]" placeholder="အရွယ်အစား" class="w-full border border-stone-300 rounded p-2 text-xs bg-white outline-none">
            </div>
            <div class="md:col-span-4">
                <input type="text" name="remarks[]" placeholder="မှတ်ချက် လိုအပ်ချက်" class="w-full border border-stone-300 rounded p-2 text-xs bg-white outline-none">
            </div>
            <div class="md:col-span-2">
                <input type="file" name="cakeImage[]" accept="image/*" class="text-xs text-stone-400 w-full file:py-1 file:px-2 file:border-0 file:bg-stone-200 cursor-pointer">
            </div>
            <div class="md:col-span-2 flex items-center justify-between gap-2">
                <input type="file" name="flowerImage[]" accept="image/*" class="text-xs text-stone-400 w-full file:py-1 file:px-2 file:border-0 file:bg-stone-200 cursor-pointer">
                <button type="button" onclick="this.closest('.item-row').remove()" class="text-rose-400 hover:text-rose-600 text-xs font-bold px-1">✕</button>
            </div>
        `;
        container.appendChild(newRow);
    }
</script>
