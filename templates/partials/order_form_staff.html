{# Staff order entry form (Burmese) — payment & price fields never shown to staff #}
<div class="no-print mb-2" id="orderFormToggleWrap">
    <button type="button" id="orderFormToggleBtn" onclick="openOrderModal()" class="w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs uppercase tracking-widest font-sans font-semibold py-4 px-6 rounded-2xl transition-all shadow-md hover:shadow-lg cursor-pointer">
        <span class="text-base leading-none">➕</span>
        <span>အော်ဒါအသစ် ထည့်ရန် (Add an Order)</span>
    </button>
</div>

<div id="orderFormModal" class="fixed inset-0 z-50 hidden bg-emerald-950/40 backdrop-blur-sm no-print flex items-center justify-center p-4 sm:p-6 transition-all duration-300">
    
    <section class="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl border border-emerald-100/50 relative" id="orderFormSection">
        
        <div class="sticky top-0 bg-white/95 backdrop-blur-md z-20 px-6 py-5 border-b border-emerald-100 flex items-center justify-between">
            <h2 class="section-title text-emerald-850 text-lg font-bold flex items-center gap-2">
                <span class="p-1.5 bg-emerald-100 rounded-xl text-lg">📝</span>
                အော်ဒါအသစ် ထည့်သွင်းရန်
            </h2>
            <button type="button" onclick="closeOrderModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-emerald-50 hover:bg-emerald-100 text-emerald-800 transition-colors cursor-pointer">
                <span class="text-lg font-bold">✕</span>
            </button>
        </div>

        <form action="/add_order" method="POST" enctype="multipart/form-data" onsubmit="handleFormSubmit(event)" class="p-6 space-y-6 text-sm font-sans">

            <div class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block font-bold tracking-wider text-emerald-900 mb-1.5 uppercase text-xs">🏷️ အော်ဒါလာသည့်နေရာ (Source)</label>
                        <input type="hidden" name="source" id="sourceHidden" value="">
                        <button type="button" id="sourceTriggerBtn" class="wp-trigger wp-empty w-full border border-emerald-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 text-left flex justify-between items-center" onclick="openSourcePicker('sourceTriggerBtn','sourceHidden','အော်ဒါလာသည့်နေရာ ရွေးပါ (Select Source)')">
                            <span>အော်ဒါလာသည့်နေရာ ရွေးပါ Select Source</span>
                            <svg class="w-4 h-4 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                    </div>
                    <div>
                        <label class="block font-bold tracking-wider text-emerald-900 mb-1.5 uppercase text-xs">👤 ဖောက်သည်အမည် (Customer)</label>
                        <input type="text" name="customer" placeholder="အမည်" class="w-full border border-emerald-200 rounded-xl p-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-500/20">
                    </div>
                </div>

                <div>
                    <label class="block font-bold tracking-wider text-emerald-900 mb-1.5 uppercase text-xs">📍 လိပ်စာ &amp; ဆက်သွယ်ရန် (Address &amp; Contact)</label>
                    <input type="text" name="address" placeholder="ပို့ဆောင်ရန် လိပ်စာ အသေးစိတ် နှင့် ဖုန်းနံပါတ်" class="w-full border border-emerald-200 rounded-xl p-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-500/20">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block font-bold tracking-wider text-emerald-900 mb-1.5 uppercase text-xs">📅 ပေးပို့မည့် ရက်စွဲ &amp; အချိန် (Delivery Date &amp; Time)</label>
                        <input type="hidden" name="date" id="dateHidden" value="">
                        <input type="hidden" name="time" id="timeHidden" value="">
                        <button type="button" id="deliveryTriggerBtn" class="wp-trigger wp-empty w-full border border-emerald-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 text-left flex justify-between items-center" onclick="openDeliveryDateWheelPicker('deliveryTriggerBtn','dateHidden','timeHidden')">
                            <span>ရက်စွဲ နှင့် အချိန် ရွေးပါ Select Date &amp; Time</span>
                            <svg class="w-4 h-4 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
                        </button>
                    </div>
                    <div>
                        <label class="block font-bold tracking-wider text-emerald-900 mb-1.5 uppercase text-xs">🚗 ကားခ (Delivery Fee)</label>
                        <input type="text" name="delivery_fee" placeholder="ကားခ မှတ်ချက် (ဥပမာ 15,000)" class="w-full border border-emerald-200 rounded-xl p-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-500/20">
                    </div>
                </div>
            </div>

            <div class="border-t border-emerald-100 pt-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold tracking-widest uppercase text-emerald-800">ကုန်ပစ္စည်းစာရင်း အသေးစိတ် (Voucher Items)</h3>
                    <button type="button" onclick="addNewItemRow()" class="text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-semibold py-1.5 px-4 rounded-xl transition-all">
                        ➕ ပစ္စည်းအသစ်ထည့်ရန်
                    </button>
                </div>

                <div id="itemsContainer" class="space-y-4">
                    <div class="item-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 bg-emerald-50/10 border border-emerald-100 rounded-2xl relative">
                        <div class="md:col-span-3">
                            <label class="block text-emerald-700 text-[11px] mb-1 font-semibold">ပစ္စည်းအမည် (e.g. Custom Cake)</label>
                            <input type="text" name="item_name[]" placeholder="ကိတ်မုန့် / ဖယောင်းတိုင် / အချိုပွဲ" class="w-full border border-emerald-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-emerald-600">
                        </div>
                        <div class="md:col-span-1">
                            <label class="block text-emerald-700 text-[11px] mb-1 font-semibold">အရွယ်အစား (Size)</label>
                            <input type="text" name="size[]" placeholder="6in" class="w-full border border-emerald-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-emerald-600">
                        </div>
                        <div class="md:col-span-4">
                            <label class="block text-emerald-700 text-[11px] mb-1 font-semibold">အထူးမှတ်ချက် (Remarks)</label>
                            <input type="text" name="remarks[]" placeholder="ရေးသားချက် လိုအပ်ချက်..." class="w-full border border-emerald-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-emerald-600">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-emerald-700 text-[11px] mb-1 font-semibold">🎂 ကိတ်မုန့် ကိုးကားပုံ</label>
                            <input type="file" name="cakeImage[]" accept="image/*" class="w-full text-xs text-emerald-800 file:py-1 file:px-2 file:rounded-lg file:border-0 file:bg-emerald-50 file:text-emerald-700 cursor-pointer">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-rose-600 text-[11px] mb-1 font-semibold">💐 ပန်းစည်း ကိုးကားပုံ</label>
                            <input type="file" name="flowerImage[]" accept="image/*" class="w-full text-xs text-stone-400 file:py-1 file:px-2 file:rounded-lg file:border-0 file:bg-rose-50 file:text-rose-700 cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4 border-t border-emerald-100 gap-3">
                <button type="button" onclick="closeOrderModal()" class="w-full sm:w-auto bg-stone-100 hover:bg-stone-200 text-stone-700 font-sans text-xs uppercase tracking-widest font-semibold py-3.5 px-8 rounded-xl transition-all">
                    ပယ်ဖျက်မည် (Cancel)
                </button>
                <button type="submit" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-sans text-xs uppercase tracking-widest font-semibold py-3.5 px-10 rounded-xl transition-all shadow-md">
                    အော်ဒါ သိမ်းဆည်းမည် (Save Order Voucher)
                </button>
            </div>
        </form>
    </section>
</div>

<script>
    function openOrderModal() {
        const modal = document.getElementById('orderFormModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    function closeOrderModal() {
        const modal = document.getElementById('orderFormModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';
    }

    // Close Modal when clicking outside the actual form container
    document.getElementById('orderFormModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeOrderModal();
        }
    });

    // Save Voucher and IMMEDIATELY hide the popup form
    function handleFormSubmit(event) {
        closeOrderModal();
    }

    // Default the delivery date to today on load
    (function initDefaultDeliveryDate() {
        const dateHidden = document.getElementById('dateHidden');
        if (dateHidden && !dateHidden.value) {
            dateHidden.value = wpIsoForOffset(0);
        }
    })();

    function addNewItemRow() {
        const container = document.getElementById('itemsContainer');
        const newRow = document.createElement('div');
        newRow.className = "item-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 bg-emerald-50/10 border border-emerald-100 rounded-2xl relative mt-3";
        newRow.innerHTML = `
            <div class="md:col-span-3">
                <input type="text" name="item_name[]" placeholder="ပစ္စည်းအမည်" class="w-full border border-emerald-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-emerald-600">
            </div>
            <div class="md:col-span-1">
                <input type="text" name="size[]" placeholder="အရွယ်အစား" class="w-full border border-emerald-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-emerald-600">
            </div>
            <div class="md:col-span-4">
                <input type="text" name="remarks[]" placeholder="မှတ်ချက် လိုအပ်ချက်" class="w-full border border-emerald-200 rounded-lg p-2 text-xs bg-white outline-none focus:border-emerald-600">
            </div>
            <div class="md:col-span-2">
                <input type="file" name="cakeImage[]" accept="image/*" class="text-xs text-emerald-800 w-full file:py-1 file:px-2 file:border-0 file:bg-emerald-50 cursor-pointer">
            </div>
            <div class="md:col-span-2 flex items-center justify-between gap-2">
                <input type="file" name="flowerImage[]" accept="image/*" class="text-xs text-rose-800 w-full file:py-1 file:px-2 file:border-0 file:bg-rose-50 cursor-pointer">
                <button type="button" onclick="this.closest('.item-row').remove()" class="text-rose-400 hover:text-rose-600 text-xs font-bold px-1 transition-colors">✕</button>
            </div>
        `;
        container.appendChild(newRow);
    }
</script>
