{# Manager order entry form - Beautiful Emerald Modal Edition #}
<div class="no-print mb-2" id="orderFormToggleWrap">
    <button type="button" id="orderFormToggleBtn" onclick="openOrderModal()" class="w-full flex items-center justify-center gap-2 bg-emerald-700 hover:bg-emerald-800 text-white text-xs uppercase tracking-widest font-sans font-semibold py-4 px-6 rounded-2xl transition-all shadow-md hover:shadow-lg cursor-pointer">
        <span class="text-base leading-none">➕</span>
        <span>新增订单 (Add an Order)</span>
    </button>
</div>

<!-- Modal Overlay Container -->
<div id="orderFormModal" class="fixed inset-0 z-50 hidden bg-emerald-950/40 backdrop-blur-sm no-print flex items-center justify-center p-4 sm:p-6 transition-all duration-300">
    
    <!-- Modal Box -->
    <section class="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl border border-stone-200 relative" id="orderFormSection">
        
        <!-- Modal Header -->
        <div class="sticky top-0 bg-white/95 backdrop-blur-md z-20 px-6 py-5 border-b border-stone-100 flex items-center justify-between">
            <h2 class="section-title text-emerald-800 text-lg font-bold flex items-center gap-2">
                <span class="p-1.5 bg-emerald-100 rounded-xl text-lg">📝</span>
                新账单快速录入
            </h2>
            <button type="button" onclick="closeOrderModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-emerald-50 hover:bg-emerald-100 text-emerald-800 transition-colors cursor-pointer">
                <span class="text-lg font-bold">✕</span>
            </button>
        </div>

        <!-- Form Body -->
        <form action="/add_order" method="POST" enctype="multipart/form-data" onsubmit="handleFormSubmit(event)" class="p-6 space-y-6 text-sm font-sans">

            <div class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">🏷️ 订单来源 (Source)</label>
                        <input type="hidden" name="source" id="sourceHidden" value="">
                        <button type="button" id="sourceTriggerBtn" class="wp-trigger wp-empty w-full border border-stone-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 text-left flex justify-between items-center bg-white" onclick="openSourcePicker('sourceTriggerBtn','sourceHidden','订单来源选择 (Select Source)')">
                            <span class="text-stone-400">选择订单来源 Select Source</span>
                            <svg class="w-4 h-4 text-stone-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                    </div>
                    <div>
                        <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">👤 客人姓名 (Customer)</label>
                        <input type="text" name="customer" placeholder="姓名" class="w-full border border-stone-300 rounded-xl p-3 text-sm outline-none focus:border-stone-950 focus:ring-2 focus:ring-emerald-500/10">
                    </div>
                </div>

                <div>
                    <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">📍 送货地址 &amp; 电话 (Address &amp; Contact)</label>
                    <input type="text" name="address" placeholder="收货详细地址及联络方式" class="w-full border border-stone-300 rounded-xl p-3 text-sm outline-none focus:border-stone-950 focus:ring-2 focus:ring-emerald-500/10">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div>
                        <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">📅 送达日期时间 (Delivery Date &amp; Time)</label>
                        <input type="hidden" name="date" id="dateHidden" value="">
                        <input type="hidden" name="time" id="timeHidden" value="">
                        <button type="button" id="deliveryTriggerBtn" class="wp-trigger wp-empty w-full border border-stone-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 text-left flex justify-between items-center bg-white" onclick="openDeliveryDateWheelPicker('deliveryTriggerBtn','dateHidden','timeHidden')">
                            <span class="text-stone-400">选择送达日期时间 Select Date &amp; Time</span>
                            <svg class="w-4 h-4 text-stone-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
                        </button>
                    </div>
                    <div>
                        <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">🚗 车费 (Delivery Fee)</label>
                        <input type="text" name="delivery_fee" placeholder="备注车费，如 5000 / 客人自付" class="w-full border border-stone-300 rounded-xl p-3 text-sm outline-none focus:border-stone-950 focus:ring-2 focus:ring-emerald-500/10">
                    </div>
                    {% if show_payment %}
                    <div>
                        <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">💰 付款状态 (Payment)</label>
                        <label class="w-full flex items-center gap-2 border border-stone-300 rounded-xl p-3 text-sm bg-stone-50/40 cursor-pointer h-[46px] focus-within:border-stone-950">
                            <input type="checkbox" name="is_paid" id="isPaidCheckbox" onchange="togglePaymentDate('paymentDateWrap','paymentDateHidden','paymentDateTriggerBtn','isPaidCheckbox')" class="w-4 h-4 accent-emerald-600">
                            <span class="text-stone-700 font-semibold">已付款 (Mark as Paid)</span>
                        </label>
                    </div>
                    {% endif %}
                </div>

                {% if show_payment %}
                <div id="paymentDateWrap" class="hidden">
                    <label class="block font-bold tracking-wider text-stone-700 mb-1.5 uppercase text-xs">🗓️ 付款日期 (Payment Date)</label>
                    <input type="hidden" name="payment_date" id="paymentDateHidden" value="">
                    <button type="button" id="paymentDateTriggerBtn" class="wp-trigger wp-empty w-full border border-stone-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 text-left flex justify-between items-center bg-white" onclick="openDateWheelPicker('paymentDateTriggerBtn','paymentDateHidden')">
                        <span class="text-stone-400">选择付款日期 Select Payment Date</span>
                        <svg class="w-4 h-4 text-stone-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
                    </button>
                </div>
                {% endif %}
            </div>

            <!-- Items Details -->
            <div class="border-t border-stone-100 pt-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold tracking-widest uppercase text-stone-500">商品清单明细 (Voucher Items)</h3>
                    <button type="button" onclick="addNewItemRow()" class="text-xs bg-stone-100 hover:bg-stone-200 text-stone-800 font-semibold py-1.5 px-4 rounded-xl transition-all">
                        ➕ 添加品类商品
                    </button>
                </div>

                <div id="itemsContainer" class="space-y-4">
                    <div class="item-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 bg-stone-50/40 border border-stone-200 rounded-2xl relative">
                        <div class="md:col-span-3">
                            <label class="block text-stone-500 text-[11px] mb-1 font-semibold">商品名称 (e.g. Custom Cake)</label>
                            <input type="text" name="item_name[]" placeholder="蛋糕 / 蜡烛 /甜品" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
                        </div>
                        <div class="md:col-span-1">
                            <label class="block text-stone-500 text-[11px] mb-1 font-semibold">尺寸 (Size)</label>
                            <input type="text" name="size[]" placeholder="6in" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-stone-500 text-[11px] mb-1 font-semibold">单品金额 (Price)</label>
                            <input type="number" name="item_price[]" placeholder="MMK" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-stone-500 text-[11px] mb-1 font-semibold">定制备注文字 (Remarks)</label>
                            <input type="text" name="remarks[]" placeholder="写字要求..." class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-stone-500 text-[11px] mb-1 font-semibold">🎂 蛋糕参考图</label>
                            <input type="file" name="cakeImage[]" accept="image/*" class="w-full text-xs text-stone-500 file:py-1 file:px-2 file:rounded-lg file:border-0 file:bg-stone-200 file:text-stone-700 cursor-pointer">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-rose-600 text-[11px] mb-1 font-semibold">💐 花束参考图</label>
                            <input type="file" name="flowerImage[]" accept="image/*" class="w-full text-xs text-stone-500 file:py-1 file:px-2 file:rounded-lg file:border-0 file:bg-rose-50 file:text-rose-700 cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sticky Bottom Actions -->
            <div class="flex justify-end pt-4 border-t border-stone-100 gap-3">
                <button type="button" onclick="closeOrderModal()" class="w-full sm:w-auto bg-stone-100 hover:bg-stone-200 text-stone-700 font-sans text-xs uppercase tracking-widest font-semibold py-3.5 px-8 rounded-xl transition-all">
                    取消 (Cancel)
                </button>
                <button type="submit" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-sans text-xs uppercase tracking-widest font-semibold py-3.5 px-10 rounded-xl transition-all shadow-md">
                    确认保存账单 (Save Order Voucher)
                </button>
            </div>
        </form>
    </section>
</div>

<script>
    function openOrderModal() {
        const modal = document.getElementById('orderFormModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    function closeOrderModal() {
        const modal = document.getElementById('orderFormModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';
    }

    document.getElementById('orderFormModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeOrderModal();
        }
    });

    function handleFormSubmit(event) {
        closeOrderModal();
    }

    // Safely gets today's local date (YYYY-MM-DD) in Myanmar/client time
    function getLocalISODate() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    (function initDefaultDeliveryDate() {
        const dateHidden = document.getElementById('dateHidden');
        if (dateHidden && !dateHidden.value) {
            // Force the default delivery date to use local browser date, not UTC
            dateHidden.value = getLocalISODate();
        }
    })();

    function addNewItemRow() {
        const container = document.getElementById('itemsContainer');
        const newRow = document.createElement('div');
        newRow.className = "item-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 bg-stone-50/40 border border-stone-200 rounded-2xl relative mt-3";
        newRow.innerHTML = `
            <div class="md:col-span-3">
                <input type="text" name="item_name[]" placeholder="商品名称" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
            </div>
            <div class="md:col-span-1">
                <input type="text" name="size[]" placeholder="尺寸" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
            </div>
            <div class="md:col-span-2">
                <input type="number" name="item_price[]" placeholder="金额 MMK" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
            </div>
            <div class="md:col-span-2">
                <input type="text" name="remarks[]" placeholder="备注要求" class="w-full border border-stone-300 rounded-lg p-2 text-xs bg-white outline-none focus:border-stone-950">
            </div>
            <div class="md:col-span-2">
                <input type="file" name="cakeImage[]" accept="image/*" class="text-xs text-stone-500 w-full file:py-1 file:px-2 file:border-0 file:bg-stone-250 cursor-pointer">
            </div>
            <div class="md:col-span-2 flex items-center justify-between gap-2">
                <input type="file" name="flowerImage[]" accept="image/*" class="text-xs text-rose-800 w-full file:py-1 file:px-2 file:border-0 file:bg-rose-50 cursor-pointer">
                <button type="button" onclick="this.closest('.item-row').remove()" class="text-rose-400 hover:text-rose-600 text-xs font-bold px-1 transition-colors">✕</button>
            </div>
        `;
        container.appendChild(newRow);
    }
</script>
